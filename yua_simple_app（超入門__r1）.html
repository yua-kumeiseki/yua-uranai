<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九命析術｜結愛の分析占い</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #faf7f2;
  --gold: #c9a84c;
  --gold-light: #f0e4c0;
  --red: #c0392b;
  --red-soft: #f9ece9;
  --purple: #6b5b9e;
  --purple-soft: #ede8f7;
  --green: #2e7d5a;
  --green-soft: #e8f4ee;
  --orange: #d4690a;
  --orange-soft: #fdf0e3;
  --pink: #b5476e;
  --pink-soft: #fceef3;
  --blue: #2c5f8a;
  --blue-soft: #e8f0f8;
  --border: #ddd5c8;
  --muted: #7a6e64;
  --shadow: 0 2px 20px rgba(26,20,16,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(107,91,158,0.05) 0%, transparent 60%);
}

.page {
  max-width: 560px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

/* ヘッダー */
.site-header {
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.site-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 2px;
  background: var(--gold);
}
.site-header .en {
  font-size: 11px;
  letter-spacing: .25em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.site-header h1 {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: .1em;
  color: var(--ink);
  margin-bottom: 8px;
}
.site-header .desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.7;
}

/* 入力フォーム */
.form-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
}
.form-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 22px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-title::before {
  content: '';
  width: 3px;
  height: 16px;
  background: var(--gold);
  border-radius: 2px;
  flex-shrink: 0;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.form-row.single { grid-template-columns: 1fr; }
.form-row.two { grid-template-columns: 1fr 1fr; }

.field label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: .04em;
}
.field select, .field input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--ink);
  background: white;
  appearance: none;
  outline: none;
  transition: border-color .2s;
}
.field select:focus, .field input:focus {
  border-color: var(--gold);
}
.field .select-wrap {
  position: relative;
}
.field .select-wrap::after {
  content: '▾';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--muted);
  pointer-events: none;
}

.btn-submit {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Shippori Mincho', serif;
  letter-spacing: .12em;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s, transform .1s;
  position: relative;
  overflow: hidden;
}
.btn-submit:hover { background: #2a2018; }
.btn-submit:active { transform: scale(.98); }
.btn-submit::after {
  content: '✦';
  margin-left: 8px;
  font-size: 10px;
  color: var(--gold);
}

/* 結果 */
#result { display: none; }

.karte {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: fadeUp .4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.karte-head {
  padding: 24px 24px 18px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #fdfbf7 0%, #f8f4ec 100%);
}
.type-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 12px;
  border-radius: 20px;
  margin-bottom: 12px;
}
.karte-head h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 21px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 5px;
  color: var(--ink);
}
.karte-head .subtype {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
}
.input-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.input-tag {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: white;
}

.karte-body {
  padding: 20px 24px;
  display: grid;
  gap: 18px;
}

.sec-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: .08em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sec-text {
  font-size: 13.5px;
  line-height: 1.9;
  color: var(--ink);
}
.note {
  font-size: 13px;
  line-height: 1.8;
  color: var(--muted);
  background: #faf7f2;
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid var(--border);
}
.divider {
  border: none;
  border-top: 1px solid #f0ebe3;
}

.logic-box {
  background: #faf7f2;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.8;
}
.logic-box strong { color: var(--ink); font-weight: 500; }

/* PDFボタン */
.karte-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.btn-pdf {
  flex: 1;
  padding: 11px;
  background: var(--gold);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Shippori Mincho', serif;
  letter-spacing: .08em;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-pdf:hover { opacity: .85; }
.btn-reset {
  padding: 11px 16px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  cursor: pointer;
  transition: border-color .2s;
}
.btn-reset:hover { border-color: var(--ink); color: var(--ink); }

@media print {
  body { background: white; }
  .page { padding: 0; max-width: 100%; }
  .form-card, .karte-footer, .site-header { display: none; }
  .karte { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="en">KUMEISEKI JUTSU</div>
    <h1>結愛の九命析術</h1>
    <p class="desc">簡易タイプ鑑定｜超入門編</p>

  <div class="form-card">

      </div>

        <div class="select-wrap">
          <select id="sel-month"></select>
        </div>
      </div>
      <div class="field">
        <label>日</label>
        <div class="select-wrap">
          <select id="sel-day"></select>
        </div>
      </div>
    </div>
    <div class="form-row two">
      <div class="field">
        <label>血液型</label>
        <div class="select-wrap">
          <select id="sel-blood">
            <option value="">選択</option>
            <option value="A">A型</option>
            <option value="B">B型</option>
            <option value="O">O型</option>
            <option value="AB">AB型</option>
            <option value="unknown">わからない</option>
          </select>
        </div>
      </div>
    </div>
    <button class="btn-submit" onclick="generate()">鑑定する</button>
  </div>

  <div id="result">
    <div class="karte" id="karte-body"></div>
  </div>

</div>

    {name:'天秤座',en:'libra',elem:'風',emoji:'♎',until:[10,23]},
    {name:'蠍座',en:'scorpio',elem:'水',emoji:'♏',until:[11,22]},
    {name:'射手座',en:'sagittarius',elem:'火',emoji:'♐',until:[12,21]},
    {name:'山羊座',en:'capricorn',elem:'地',emoji:'♑',until:[12,31]}

// 星座判定
function getZodiac(month, day) {
  const zodiacs = [
    {name:'山羊座',emoji:'♑',until:[1,19]},
    {name:'水瓶座',emoji:'♒',until:[2,18]},
    {name:'魚座',emoji:'♓',until:[3,20]},
    {name:'牡羊座',emoji:'♈',until:[4,19]},
    {name:'牡牛座',emoji:'♉',until:[5,20]},
    {name:'双子座',emoji:'♊',until:[6,21]},
    {name:'蟹座',emoji:'♋',until:[7,22]},
    {name:'獅子座',emoji:'♌',until:[8,22]},
    {name:'乙女座',emoji:'♍',until:[9,22]},
    {name:'天秤座',emoji:'♎',until:[10,23]},
    {name:'蠍座',emoji:'♏',until:[11,22]},
    {name:'射手座',emoji:'♐',until:[12,21]},
    {name:'山羊座',emoji:'♑',until:[12,31]}
  ];
  for(const z of zodiacs) {
    if(month < z.until[0] || (month === z.until[0] && day <= z.until[1])) return z;
  }
  return zodiacs[0];
}

// 干支判定
function getEto(year) {
  const etos = ['申','酉','戌','亥','子','丑','寅','卯','辰','巳','午','未'];
  const eto = etos[year % 12];
  const emojis = {'申':'🐒','酉':'🐓','戌':'🐕','亥':'🐗','子':'🐭','丑':'🐮','寅':'🐯','卯':'🐰','辰':'🐲','巳':'🐍','午':'🐴','未':'🐑'};
  return { name: eto, emoji: emojis[eto] };
}

// グループ判定
function getGroup(day) {
  if([1,10,19,28].includes(day)) return 1;
  if([2,11,20,29].includes(day)) return 2;
  if([3,12,21,30].includes(day)) return 3;
  if([4,13,22,31].includes(day)) return 4;
  if([5,14,23].includes(day)) return 5;
  if([6,15,24].includes(day)) return 6;
  if([7,16,25].includes(day)) return 7;
  if([8,17,26].includes(day)) return 8;
  if([9,18,27].includes(day)) return 9;
  return null;
}
